<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir Senha — START Reciclagem</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
<div class="auth-wrap" style="max-width:460px">
  <div class="auth-form" style="width:100%">
    <div class="auth-title">Redefinir senha</div>

    {% if error %}
      <div class="msg error" style="display:block">{{ error }}</div>
      <div class="auth-links" style="margin-top:14px">
        <a href="/login">← Voltar ao login</a>
      </div>
    {% elif success %}
      <div class="msg success" style="display:block">{{ success }}</div>
      <div class="auth-links" style="margin-top:14px">
        <a href="/login">← Ir para o login</a>
      </div>
    {% else %}
    <form method="POST" action="/reset-password/{{ token }}"
          style="display:flex;flex-direction:column;gap:14px;margin-top:16px">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" value="{{ email }}" disabled style="opacity:.6">
      </div>
      <div class="form-group">
        <label>Nova senha</label>
        <input type="password" name="password" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <div class="form-group">
        <label>Confirmar nova senha</label>
        <input type="password" name="confirm_password" placeholder="Repita a senha" required minlength="6">
      </div>
      <button type="submit" class="btn-primary">Salvar nova senha</button>
      <div class="auth-links">
        <a href="/login">← Voltar ao login</a>
      </div>
    </form>
    {% endif %}
  </div>
</div>
</body>
</html>
